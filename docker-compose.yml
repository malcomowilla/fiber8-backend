services:
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0 -p 3000"
    network_mode: host
    cap_add:
    - NET_ADMIN
    mem_limit: 780m
    mem_reservation: 128m
    restart: unless-stopped
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - freeradius_shared:/freeradius 
    # ports:
    #   - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_HOST: host.docker.internal
      DATABASE_PORT: ${DB_PORT}
      DATABASE_NAME: ${DB_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_URL: redis://localhost:6379/0
      SIDEKIQ_REDIS_URL: redis://localhost:6379/1
      SECRET_KEY_BASE: development-secret-key
      RAILS_LOG_TO_STDOUT: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway" # 👈 Required for Linux users
    depends_on:
      redis:
        condition: service_healthy
    # networks:
    #   - appnet

   

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile
    command: bundle exec sidekiq -C config/sidekiq.yml
    network_mode: host
    cap_add:
    - NET_ADMIN
    mem_limit: 512m
    mem_reservation: 256m
    restart: unless-stopped

    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - /etc/freeradius/3.0:/etc/freeradius/3.0
    environment:
      RAILS_ENV: development
      DATABASE_HOST: host.docker.internal
      DATABASE_PORT: ${DB_PORT}
      DATABASE_NAME: ${DB_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      REDIS_URL: redis://localhost:6379/0
      SIDEKIQ_REDIS_URL: redis://localhost:6379/1
      SECRET_KEY_BASE: development-secret-key
      RAILS_LOG_TO_STDOUT: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway" # 👈 Required for Linux users
    depends_on:
      redis:
        condition: service_healthy
    # networks:
    #   - appnet

volumes:
  redisdata:
  bundle_cache:
  freeradius_shared:

networks:
  appnet:
    driver: bridge